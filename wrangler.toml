name = "klaviyo-list-cleaner"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_URL = "https://klaviyo-list-cleaner.crmr.workers.dev"

# Daily at 3 AM UTC
[triggers]
crons = ["0 3 * * *"]

# D1 database for profile state, run history, audit log
[[d1_databases]]
binding = "DB"
database_name = "list-cleaner-db"
database_id = "189c17fb-e906-4978-9089-1c06c2a75f8c"

# KV namespace for configuration
[[kv_namespaces]]
binding = "CONFIG"
id = "2f15e0df8e2b453580f043505bb65a12"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Secrets (set via wrangler secret put):
# NEVERBOUNCE_API_KEY - NeverBounce API key (shared across accounts)
# DASHBOARD_TOKEN    - Bearer token for dashboard access
# SENTRY_DSN         - Sentry DSN for error tracking (optional)
# SENDGRID_API_KEY   - SendGrid API key for email notifications (optional)
# Note: Klaviyo API keys are stored per-account in KV, not as secrets
